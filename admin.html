<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SoftGrid Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:0}
    .container{display:flex;min-height:100vh}
    aside{width:260px;background:#1e293b;padding:24px;flex-shrink:0}
    aside h1{color:#60a5fa;font-size:1.6rem;margin-bottom:32px}
    aside a{display:block;color:#94a3b8;padding:12px 16px;border-radius:12px;text-decoration:none;margin:4px 0}
    aside a:hover, aside a.active{background:#334155;color:#fff}
    main{flex:1;padding:32px}
    .card{background:#1e293b;border-radius:16px;padding:24px;margin-bottom:24px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:32px}
    .stat-card{background:#334155;border-radius:12px;padding:20px;text-align:center}
    .stat-card h3{margin:0 0 8px;font-size:.95rem;color:#94a3b8}
    .stat-card p{margin:0;font-size:2.1rem;font-weight:700}
    table{width:100%;border-collapse:collapse}
    th,td{padding:14px;text-align:left;border-bottom:1px solid #334155}
    th{color:#94a3b8}
    .btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:600}
    .btn-primary{background:#3b82f6;color:white}
    .btn-danger{background:#ef4444;color:white}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;margin-bottom:8px;color:#94a3b8}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:12px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0}
    #loginForm{max-width:420px;margin:120px auto;padding:40px;background:#1e293b;border-radius:16px}
  </style>
</head>
<body>

<div id="loginScreen">
  <form id="loginForm">
    <h2 style="text-align:center;margin-bottom:32px">Admin Login</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="adminEmail" required/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="adminPassword" required/>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
    <p id="loginError" style="color:#fca5a5;text-align:center;margin-top:12px"></p>
  </form>
</div>

<div id="dashboard" style="display:none">
  <div class="container">
    <aside>
      <h1>SoftGrid Admin</h1>
      <a href="#" class="active"><i class="fa-solid fa-gauge"></i> Dashboard</a>
      <a href="#"><i class="fa-solid fa-cube"></i> Software</a>
      <a href="#"><i class="fa-solid fa-ad"></i> Ads & Redirects</a>
      <a href="#" id="logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </aside>
    <main>
      <h1>Dashboard</h1>
      <div class="stats">
        <div class="stat-card">
          <h3>Total Tools</h3>
          <p id="totalTools">—</p>
        </div>
        <div class="stat-card">
          <h3>Total Downloads</h3>
          <p id="totalDownloads">—</p>
        </div>
        <div class="stat-card">
          <h3>Featured</h3>
          <p id="featuredCount">—</p>
        </div>
      </div>

      <!-- Add / Edit form placeholder -->
      <div class="card">
        <h2>Add New Software</h2>
        <!-- Form fields here – name, version, category, links, etc. -->
        <p>(Form coming after ad details & admin credentials provided)</p>
      </div>

      <!-- Software list table -->
      <div class="card">
        <h2>All Software</h2>
        <table id="softwareTable">
          <thead><tr><th>Name</th><th>Category</th><th>Downloads</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const firebaseConfig = { /* same as index.html */ };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const loginScreen = document.getElementById('loginScreen');
  const dashboard = document.getElementById('dashboard');

  onAuthStateChanged(auth, user => {
    if (user) {
      loginScreen.style.display = 'none';
      dashboard.style.display = 'block';
      loadStats();
    } else {
      loginScreen.style.display = 'block';
      dashboard.style.display = 'none';
    }
  });

  document.getElementById('loginForm').onsubmit = async e => {
    e.preventDefault();
    const email = document.getElementById('adminEmail').value;
    const pass = document.getElementById('adminPassword').value;
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (err) {
      document.getElementById('loginError').textContent = err.message.includes('wrong-password') ? 'Invalid credentials' : err.message;
    }
  };

  document.getElementById('logout').onclick = () => signOut(auth);

  async function loadStats() {
    const snap = await getDocs(collection(db, "software"));
    let totalDl = 0, featured = 0;
    snap.forEach(d => {
      const data = d.data();
      totalDl += data.downloads || 0;
      if (data.featured) featured++;
    });
    document.getElementById('totalTools').textContent = snap.size;
    document.getElementById('totalDownloads').textContent = totalDl;
    document.getElementById('featuredCount').textContent = featured;
  }
</script>
</body>
</html>
